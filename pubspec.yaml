name: koibus
description: "Koi Bus — Smart bus journey planner for West Bengal"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  # Routing
  go_router: ^14.6.2

  # Local Storage
  hive_flutter: ^1.1.0
  sqflite: ^2.4.2
  path: ^1.9.1

  # UI & Animations
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8


  shared_preferences: ^2.3.4
  intl: ^0.20.2
  collection: ^1.19.1
  geolocator: ^14.0.2
  flutter_native_splash: ^2.4.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/logo_flash.png"
  android: true
  ios: true
